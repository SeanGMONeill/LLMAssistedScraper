AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: West End Theatre Cast Tracker - Serverless Scraping Architecture

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Environment name (dev or prod)

  CertificateArn:
    Type: String
    Default: arn:aws:acm:us-east-1:749282812504:certificate/7a3551d0-5a27-496f-8ac9-5c1d118df3e9
    Description: ACM certificate ARN (us-east-1) for theatre.muddl.io

  AnthropicApiKeySecretName:
    Type: String
    Default: west-end-scraper/anthropic-api-key
    Description: Name of the Secrets Manager secret containing Anthropic API key

  AlertEmail:
    Type: String
    Description: Email address for scraping alerts (leave empty to skip)
    Default: ""

  ScheduleEnabled:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable daily scraping schedule (true for prod, false for dev)

  PressReleaseScheduleEnabled:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable daily press release ingestion schedule

Conditions:
  IsProd: !Equals [!Ref Environment, prod]
  HasAlertEmail: !Not [!Equals [!Ref AlertEmail, ""]]
  ScheduleIsEnabled: !Equals [!Ref ScheduleEnabled, "true"]
  PressReleaseScheduleIsEnabled: !Equals [!Ref PressReleaseScheduleEnabled, "true"]

Globals:
  Function:
    Timeout: 300
    MemorySize: 512
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        SCRAPES_TABLE: !Ref ScrapesTable
        ACTOR_INDEX_TABLE: !Ref ActorIndexTable
        SHOW_INDEX_TABLE: !Ref ShowIndexTable
        ALERT_TOPIC_ARN: !Ref AlertTopic
        ANTHROPIC_API_KEY_SECRET: !Ref AnthropicApiKeySecretName

Resources:
  # ==================== DynamoDB Tables ====================

  ScrapesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub WestEndScrapes-${Environment}
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: date_key
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: DateIndex
          KeySchema:
            - AttributeName: date_key
              KeyType: HASH
            - AttributeName: PK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: WestEndScraper

  ActorIndexTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub WestEndActorIndex-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: is_current
          AttributeType: N
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: CurrentShowsIndex
          KeySchema:
            - AttributeName: is_current
              KeyType: HASH
            - AttributeName: PK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ShowIndexTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub WestEndShowIndex-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ==================== SQS Queues ====================

  ScrapeJobsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub west-end-scrape-jobs-${Environment}
      VisibilityTimeout: 360  # 6 minutes (longer than Lambda timeout)
      MessageRetentionPeriod: 86400  # 24 hours
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ScrapeJobsDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ScrapeJobsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub west-end-scrape-jobs-dlq-${Environment}
      MessageRetentionPeriod: 1209600  # 14 days
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ==================== SNS Topic for Alerts ====================

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub west-end-scraper-alerts-${Environment}
      DisplayName: West End Scraper Alerts
      Tags:
        - Key: Environment
          Value: !Ref Environment

  AlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlertEmail
    Properties:
      Protocol: email
      TopicArn: !Ref AlertTopic
      Endpoint: !Ref AlertEmail

  # ==================== Lambda Functions ====================

  ScraperFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub west-end-scraper-${Environment}
      PackageType: Image
      MemorySize: 2048
      Timeout: 300  # 5 minutes
      ReservedConcurrentExecutions: 3
      Environment:
        Variables:
          SITES_CONFIG_PATH: /var/task/sites/west_end.json
          HOME: /tmp
          TMPDIR: /tmp
          TEMP: /tmp
          TMP: /tmp
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ScrapesTable
        - SQSPollerPolicy:
            QueueName: !GetAtt ScrapeJobsQueue.QueueName
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt AlertTopic.TopicName
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AnthropicApiKeySecretName}*'
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt ScrapeJobsQueue.Arn
            BatchSize: 1
            MaximumBatchingWindowInSeconds: 0
      DeadLetterQueue:
        Type: SNS
        TargetArn: !Ref AlertTopic
    Metadata:
      Dockerfile: lambda/scraper/Dockerfile.scraper
      DockerContext: .
      DockerTag: latest

  PostProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub west-end-post-processor-${Environment}
      CodeUri: lambda/post_processor/
      Handler: app.lambda_handler
      Runtime: python3.12
      MemorySize: 512
      Timeout: 60
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ActorIndexTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ShowIndexTable
        - DynamoDBReadPolicy:
            TableName: !Ref ScrapesTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt AlertTopic.TopicName
      Events:
        DynamoDBStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt ScrapesTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 10
            MaximumBatchingWindowInSeconds: 5
            FilterCriteria:
              Filters:
                - Pattern: '{"eventName": ["INSERT"], "dynamodb": {"NewImage": {"scrape_status": {"S": ["success"]}}}}'
      DeadLetterQueue:
        Type: SNS
        TargetArn: !Ref AlertTopic

  # ==================== EventBridge Schedule ====================

  DailyScrapeSchedule:
    Type: AWS::Scheduler::Schedule
    Condition: ScheduleIsEnabled
    Properties:
      Name: !Sub west-end-daily-scrape-${Environment}
      Description: Trigger daily West End theatre scraping
      ScheduleExpression: cron(0 6 * * ? *)  # 6 AM UTC daily
      ScheduleExpressionTimezone: UTC
      FlexibleTimeWindow:
        Mode: "OFF"
      State: ENABLED
      Target:
        Arn: !GetAtt ScheduleTargetFunction.Arn
        RoleArn: !GetAtt ScheduleExecutionRole.Arn

  ScheduleTargetFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub west-end-schedule-target-${Environment}
      CodeUri: lambda/schedule_target/
      Handler: app.lambda_handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 30
      Environment:
        Variables:
          QUEUE_URL: !Ref ScrapeJobsQueue
          SITES_CONFIG_S3_BUCKET: !Ref SitesConfigBucket
          SITES_CONFIG_S3_KEY: scrape_config.json
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt ScrapeJobsQueue.QueueName
        - S3ReadPolicy:
            BucketName: !Ref SitesConfigBucket
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt AlertTopic.TopicName

  ScheduleExecutionRole:
    Type: AWS::IAM::Role
    Condition: ScheduleIsEnabled
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt ScheduleTargetFunction.Arn

  # ==================== S3 Bucket for Sites Config ====================

  SitesConfigBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub west-end-scraper-config-${Environment}-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ==================== Press Release Pipeline ====================

  PressReleasesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub WestEndPressReleases-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: WestEndScraper

  PressReleaseContentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub west-end-press-releases-${Environment}-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: WestEndScraper

  PressReleaseIngesterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub west-end-press-release-ingester-${Environment}
      CodeUri: lambda/press_release_ingester/
      Handler: app.lambda_handler
      Runtime: python3.12
      MemorySize: 512
      Timeout: 900
      Environment:
        Variables:
          PRESS_RELEASES_TABLE: !Ref PressReleasesTable
          SCRAPES_TABLE: !Ref ScrapesTable
          SHOW_INDEX_TABLE: !Ref ShowIndexTable
          PRESS_RELEASE_CONTENT_BUCKET: !Ref PressReleaseContentBucket
          SITES_CONFIG_S3_BUCKET: !Ref SitesConfigBucket
          PRESS_RELEASE_SOURCES_S3_KEY: press_release_sources.json
          SHOWS_CONFIG_S3_KEY: shows.json
          ANTHROPIC_API_KEY_SECRET: !Ref AnthropicApiKeySecretName
          ALERT_TOPIC_ARN: !Ref AlertTopic
          ENVIRONMENT: !Ref Environment
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PressReleasesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ScrapesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ShowIndexTable
        - S3CrudPolicy:
            BucketName: !Ref PressReleaseContentBucket
        - S3ReadPolicy:
            BucketName: !Ref SitesConfigBucket
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt AlertTopic.TopicName
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AnthropicApiKeySecretName}*'
      DeadLetterQueue:
        Type: SNS
        TargetArn: !Ref AlertTopic

  PressReleaseSchedule:
    Type: AWS::Scheduler::Schedule
    Condition: PressReleaseScheduleIsEnabled
    Properties:
      Name: !Sub west-end-press-release-daily-${Environment}
      Description: Trigger daily press release ingestion (after main scraper)
      ScheduleExpression: cron(0 7 * * ? *)  # 7 AM UTC daily
      ScheduleExpressionTimezone: UTC
      FlexibleTimeWindow:
        Mode: "OFF"
      State: ENABLED
      Target:
        Arn: !GetAtt PressReleaseIngesterFunction.Arn
        RoleArn: !GetAtt PressReleaseScheduleExecutionRole.Arn

  PressReleaseScheduleExecutionRole:
    Type: AWS::IAM::Role
    Condition: PressReleaseScheduleIsEnabled
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokePressReleaseIngester
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt PressReleaseIngesterFunction.Arn

  # ==================== CloudWatch Alarms ====================

  ScraperErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub west-end-scraper-errors-${Environment}
      AlarmDescription: Alert when scraper error rate exceeds 10%
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 3600  # 1 hour
      EvaluationPeriods: 1
      Threshold: 5  # More than 5 errors in an hour
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref ScraperFunction
      AlarmActions:
        - !Ref AlertTopic
      TreatMissingData: notBreaching

  DLQDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProd
    Properties:
      AlarmName: !Sub west-end-dlq-messages-${Environment}
      AlarmDescription: Alert when messages appear in DLQ
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Sum
      Period: 300  # 5 minutes
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScrapeJobsDLQ.QueueName
      AlarmActions:
        - !Ref AlertTopic
      TreatMissingData: notBreaching

  # ==================== API Lambda ====================

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub west-end-api-${Environment}
      CodeUri: lambda/api/
      Handler: app.lambda_handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 30
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ActorIndexTable
        - DynamoDBReadPolicy:
            TableName: !Ref ShowIndexTable
      Events:
        HttpApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: GET

  # ==================== HTTP API Gateway ====================

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - OPTIONS
        AllowHeaders:
          - Content-Type

  # ==================== Static Website (S3 + CloudFront) ====================

  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub west-end-website-${Environment}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  WebsiteOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub west-end-website-oac-${Environment}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebsiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_100  # US, Canada, Europe
        Aliases:
          - theatre.muddl.io
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""  # Required placeholder when using OAC
            OriginAccessControlId: !GetAtt WebsiteOAC.Id
          - Id: ApiOrigin
            DomainName: !Sub "${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebsiteBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebsiteDistribution}"

  TheatreDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: Z09670653L26HQLRCE66N
      Name: theatre.muddl.io.
      Type: A
      AliasTarget:
        DNSName: !GetAtt WebsiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront hosted zone ID (constant)
        EvaluateTargetHealth: false

Outputs:
  ScrapesTableName:
    Description: DynamoDB table for scrape results
    Value: !Ref ScrapesTable
    Export:
      Name: !Sub ${AWS::StackName}-ScrapesTable

  ActorIndexTableName:
    Description: DynamoDB table for actor index
    Value: !Ref ActorIndexTable
    Export:
      Name: !Sub ${AWS::StackName}-ActorIndexTable

  ShowIndexTableName:
    Description: DynamoDB table for show index
    Value: !Ref ShowIndexTable
    Export:
      Name: !Sub ${AWS::StackName}-ShowIndexTable

  ScrapeJobsQueueUrl:
    Description: SQS queue URL for scrape jobs
    Value: !Ref ScrapeJobsQueue
    Export:
      Name: !Sub ${AWS::StackName}-ScrapeJobsQueueUrl

  SitesConfigBucket:
    Description: S3 bucket for sites configuration
    Value: !Ref SitesConfigBucket
    Export:
      Name: !Sub ${AWS::StackName}-SitesConfigBucket

  AlertTopicArn:
    Description: SNS topic ARN for alerts
    Value: !Ref AlertTopic
    Export:
      Name: !Sub ${AWS::StackName}-AlertTopicArn

  ScraperFunctionArn:
    Description: Lambda function ARN for scraper
    Value: !GetAtt ScraperFunction.Arn

  PostProcessorFunctionArn:
    Description: Lambda function ARN for post-processor
    Value: !GetAtt PostProcessorFunction.Arn

  CloudFrontUrl:
    Description: CloudFront distribution URL for the web app
    Value: !Sub "https://${WebsiteDistribution.DomainName}"

  CloudFrontDistributionId:
    Description: CloudFront distribution ID (used by deploy-frontend.sh)
    Value: !Ref WebsiteDistribution

  WebsiteBucketName:
    Description: S3 bucket for React build artifacts
    Value: !Ref WebsiteBucket

  ApiUrl:
    Description: HTTP API Gateway URL (use as VITE_API_URL for local dev)
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"

  PressReleasesTableName:
    Description: DynamoDB table for press release deduplication
    Value: !Ref PressReleasesTable
    Export:
      Name: !Sub ${AWS::StackName}-PressReleasesTable

  PressReleaseContentBucketName:
    Description: S3 bucket for raw press release HTML
    Value: !Ref PressReleaseContentBucket

  PressReleaseIngesterFunctionArn:
    Description: Lambda function ARN for press release ingester
    Value: !GetAtt PressReleaseIngesterFunction.Arn
